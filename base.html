<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MedRef{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <header class="header">
    <div class="logo">
      <span class="logo-text">Med<span class="logo-accent">Ref</span></span>
    </div>
    <nav class="nav">
      <a href="/" class="nav-link">Поиск</a>
      <a href="/about" class="nav-link">О проекте</a>
    </nav>
  </header>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>© 2026 MedRef — <span class="footer-warning">только для справки, не для самолечения</span></span>

</body>
</html>
